config:
  target: "http://localhost:8000"
  phases:
    - duration: 60   # duração do teste em segundos
      arrivalRate: 50  # 50 usuários por segundo
  processor: "./functions.js"
  payload:
    path: "./users.csv"
    fields:
      - username
      - password
    order: sequence # ou "random" se preferir
  http:
    requestTimeout: 10000 # 10000
    headers:
      Content-Type: application/json

scenarios:
  - name: List Drivers (Authenticated)
    flow:
#      - function: "authenticate"
      - get:
          url: "/api/v1/drivers"
          headers:
            Custom-User: "{{ username }}"
#            Authorization: "Bearer {{ token }}"
