apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ridely-database.fullname" . }}-connection-test
  annotations:
    "helm.sh/hook": test
spec:
  template:
    spec:
      containers:
        - name: mysql-test
          image: mysql:8
          command: ["sh", "-c"]
          args:
            - |
              echo "[1/3] Creating temporary user 'healthcheck'...";
              mysql -h {{ include "ridely-database.fullname" . }} -u root -p"$MYSQL_ROOT_PASSWORD" \
                -e "CREATE USER IF NOT EXISTS 'healthcheck'@'%' IDENTIFIED BY '$MYSQL_HEALTHCHECK_PASSWORD'; GRANT SELECT ON *.* TO 'healthcheck'@'%'; FLUSH PRIVILEGES;" || exit 1;

              echo "[2/3] Testing connection with user 'healthcheck'...";
              mysql -h {{ include "ridely-database.fullname" . }} -u healthcheck -p"$MYSQL_HEALTHCHECK_PASSWORD" \
                -e "SELECT 1;" || exit 2;

              echo "[3/3] Dropping user 'healthcheck'...";
              mysql -h {{ include "ridely-database.fullname" . }} -u root -p"$MYSQL_ROOT_PASSWORD" \
                -e "DROP USER IF EXISTS 'healthcheck'@'%'; FLUSH PRIVILEGES;" || exit 3;

              echo "✔️ Database connection test completed successfully.";
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ridely-database.fullname" . }}-secret
                  key: mysql-root-password
            - name: MYSQL_HEALTHCHECK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ridely-database.fullname" . }}-secret
                  key: mysql-healthcheck-password
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
      restartPolicy: Never
      terminationGracePeriodSeconds: 30
  backoffLimit: 2
