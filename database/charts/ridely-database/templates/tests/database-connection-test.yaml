apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ridely-database.fullname" . }}-connection-test
  annotations:
    "helm.sh/hook": test
spec:
  template:
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: mysql:8
          command: ["sh", "-c"]
          args:
            - |
              mysql -h {{ .Chart.Name }} -u root -p"$MYSQL_ROOT_PASSWORD" -e "SELECT 1;"
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ridely-database.fullname" . }}-secret
                  key: mysql-root-password
      restartPolicy: Never
  backoffLimit: 2