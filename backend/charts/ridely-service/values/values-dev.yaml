hpa:
  minReplicas: 2
  maxReplicas: 5

nginx:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 100Mi
    limits:
      cpu: 100m
      memory: 100Mi

php:
  enabled: true
  replicas: 1
  resources:
    requests:
      cpu: 400m
      memory: 300Mi
    limits:
      cpu: 400m
      memory: 300Mi

tasks:
  rideEstimates:
    enabled: true
    replicas: 6
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        cpu: 50m
        memory: 100Mi

images:
  nginx:
    repository: ridely-service-nginx
    tag: latest
    pullPolicy: IfNotPresent
  php:
    repository: ridely-service-php
    tag: latest
    pullPolicy: IfNotPresent

migrate:
  enabled: true

app:
  appKey: "base64:FF7T5Jj4AnEY80EmNzcP5Vm5HbEWnTgz2ea8DBGFG/A="
  KeycloakClientSecret: "4OYZ6GvG3we5UKsZ2kUM6HyrHGRsFtyQ"

env:
  LOG_CHANNEL: stack
  LOG_STACK_CHANNELS: json
  LOG_LEVEL: info

  CACHE_DRIVER: redis

  # Dev mode "true" to avoid token validation
  APP_DEV_MODE: true
  APP_ENV: development
  APP_DEBUG: "false"
  DB_CONNECTION: mysql
  DB_HOST: ridely-database
  DB_PORT: 3306
  DB_DATABASE: ridely
  DB_USERNAME: root

  REDIS_HOST: ridely-cache-database-redis-master
  REDIS_PASSWORD: redis-pass
  REDIS_PORT: 6379
  REDIS_DB: 0
  REDIS_PREFIX: ''

  KEYCLOAK_HEALTH_CHECK_URL: http://auth-service-keycloak:80/realms/master
  KEYCLOAK_ISSUER: http://auth-service-keycloak/realms/spa-customers
  KEYCLOAK_REALM_URL: http://auth-service-keycloak:80/realms/spa-customers
  KEYCLOAK_CLIENT_ID: ridely-service

  LOCATION_SERVICE_URL: 'https://nominatim.openstreetmap.org/search'
  REQUEST_LIMIT_PER_MINUTE: 1200


